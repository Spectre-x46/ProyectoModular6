<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VitalCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">🏥 VitalCare</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'listar_pacientes' %}">Pacientes</a>
                <a class="nav-link" href="{% url 'listar_doctores' %}">Doctores</a>
                <a class="nav-link" href="{% url 'listar_horas' %}">Horas Médicas</a>
                <a class="nav-link text-warning" href="{% url 'logout' %}" onclick="event.preventDefault(); document.getElementById('logout-form').submit();">Cerrar Sesión</a>
                <form id="logout-form" method="POST" action="{% url 'logout' %}" style="display:none;">{% csrf_token %}</form>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">VitalCare © 2024</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
