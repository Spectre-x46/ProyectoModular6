{% extends 'clinica/base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card border-danger border-2 shadow-sm">
            <div class="card-header bg-danger text-white text-center">
                <h4 class="mb-0 py-1">⚠️ Confirmar Eliminación</h4>
            </div>
            <div class="card-body text-center p-4">
                <p class="fs-5">¿Estás seguro de que deseas eliminar <strong>{{ objeto }}</strong>?</p>
                <p class="text-danger small">Esta acción no se puede deshacer.</p>
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3 mt-3">
                        <button type="submit" class="btn btn-danger px-4">Sí, eliminar</button>
                        <a href="{{ cancelar_url }}" class="btn btn-secondary px-4">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
